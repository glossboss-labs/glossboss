name: Maintenance / Sync Uncodixfy

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: uncodixfy-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync vendored Uncodixfy files
        run: bun run sync:uncodixfy

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync uncodixfy'
          branch: chore/sync-uncodixfy
          delete-branch: true
          title: 'chore: sync uncodixfy'
          body: |
            Automated update of the vendored `Uncodixfy` skill files.

            This PR was created by the `Sync Uncodixfy` workflow after running:

            ```bash
            bun run sync:uncodixfy
            ```
          assignees: |
            lammersbjorn
            toineenzo
