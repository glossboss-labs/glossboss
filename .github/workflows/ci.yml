name: Checks / CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.src }}
      i18n: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.i18n }}
      ci: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            src:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
            i18n:
              - 'src/**/*.{ts,tsx}'
              - 'src/lib/app-language/**'
              - 'scripts/extract-i18n.ts'
              - 'scripts/sync-en-strings.ts'
            ci:
              - '.github/workflows/**'

  quality-and-tests:
    name: Quality & Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Register TypeScript problem matcher
        run: echo "::add-matcher::.github/matchers/tsc.json"

      - name: Check (lint + format + typecheck)
        run: pnpm run typecheck && pnpm run lint && pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test (coverage)
        run: |
          set -o pipefail
          pnpm run test:coverage -- --pool=forks 2>&1 | tee test-output.txt

      - name: Test summary
        if: always()
        run: |
          if [ -f test-output.txt ]; then
            {
              echo "## Test Results"
              echo ""
              echo '```'
              tail -20 test-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      # i18n: extract strings and auto-commit if out of sync
      - name: Sync i18n strings
        if: needs.detect-changes.outputs.i18n == 'true' || needs.detect-changes.outputs.ci == 'true'
        run: |
          pnpm run i18n:sync-en
          pnpm run i18n:extract

      - name: Auto-commit i18n changes
        if: |
          (needs.detect-changes.outputs.i18n == 'true' || needs.detect-changes.outputs.ci == 'true') &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet src/lib/app-language/locales/; then
            echo "i18n strings are up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/lib/app-language/locales/
            git commit -m "chore: auto-sync i18n strings"
            git push origin HEAD:${{ github.head_ref }}
            echo "::notice::Auto-committed i18n string changes to PR branch"
          fi

      - name: i18n summary
        if: always() && (needs.detect-changes.outputs.i18n == 'true' || needs.detect-changes.outputs.ci == 'true')
        run: |
          {
            echo "## i18n Status"
            echo ""
            echo "| Language | Untranslated |"
            echo "|----------|-------------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for po in src/lib/app-language/locales/app.*.po; do
            lang=$(echo "$po" | sed 's/.*app\.\(.*\)\.po/\1/')
            if [ "$lang" = "en" ]; then continue; fi
            count=$(awk '
              /^msgid "/ {
                msgid = $0
                sub(/^msgid "/, "", msgid)
                sub(/"$/, "", msgid)
                if (msgid == "") { in_msgid = 1; msgid = ""; next }
                in_msgid = 0
                next
              }
              in_msgid && /^"/ {
                line = $0
                sub(/^"/, "", line)
                sub(/"$/, "", line)
                msgid = msgid line
                next
              }
              in_msgid { in_msgid = 0 }
              /^msgstr ""$/ && msgid != "" { count++ }
              /^msgstr ".+"/ { msgid = "" }
              /^msgstr ""$/ { msgid = "" }
              END { print count + 0 }
            ' "$po")
            echo "| $lang | $count |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$count" -gt 0 ]; then
              echo "::warning::$po has $count untranslated string(s)"
            fi
          done

      - name: Summary
        if: failure()
        run: |
          {
            echo "## Quality Check Failed"
            echo ""
            echo "One or more quality checks did not pass. See the logs above for details."
          } >> "$GITHUB_STEP_SUMMARY"

  ci-gate:
    name: CI Gate
    if: always()
    needs: [quality-and-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check results
        run: |
          echo "## CI Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quality & Tests | ${{ needs.quality-and-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"

          RESULTS='${{ toJSON(needs.*.result) }}'
          echo "Results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result: PASSED**" >> "$GITHUB_STEP_SUMMARY"
