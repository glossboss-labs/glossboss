name: i18n Translation Issues

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/app-language/locales/app.*.po'
  workflow_dispatch:

jobs:
  manage-translation-issues:
    name: Manage Translation Tracking Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Ensure i18n label exists
        run: gh label create i18n --color "1d76db" --description "Translation tracking" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Manage translation issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Map language codes to display names and GitHub assignees.
          # "assignees" is a comma-separated list of GitHub usernames.
          # Add entries here or use: bun run i18n:add-lang <code> --assignee <user>
          LANG_CONFIG='{"en":{"name":"English","assignees":"lammersbjorn,toineenzo"},"nl":{"name":"Dutch","assignees":"lammersbjorn,toineenzo"}}'

          for po in src/lib/app-language/locales/app.*.po; do
            lang=$(echo "$po" | sed 's/.*app\.\(.*\)\.po/\1/')
            if [ "$lang" = "en" ]; then continue; fi

            name=$(echo "$LANG_CONFIG" | jq -r --arg l "$lang" '.[$l].name // $l')
            assignees=$(echo "$LANG_CONFIG" | jq -r --arg l "$lang" '.[$l].assignees // ""')
            title="[Translations] i18n: Untranslated strings in ${name} (${lang})"

            # Collect untranslated msgids (empty msgstr after a non-empty msgid).
            # Handles multi-line msgid/msgstr continuation blocks correctly: a
            # "msgstr """ opening followed by continuation lines "..." is NOT
            # empty — only a msgstr block whose fully-assembled value is "" is
            # considered untranslated.
            untranslated=$(awk '
              # Flush the previous entry: report if any msgstr was empty.
              function flush() {
                if (msgid != "" && has_empty_msgstr) print "- [ ] `" msgid "`"
                msgid = ""; msgstr = ""; in_msgid = 0; in_msgstr = 0; has_empty_msgstr = 0
              }
              /^msgid "/ {
                flush()
                msgid = $0
                sub(/^msgid "/, "", msgid)
                sub(/"$/, "", msgid)
                in_msgid = 1
                next
              }
              /^msgid_plural "/ {
                # Still part of the same entry; stay in msgid-accumulation mode.
                in_msgid = 1; in_msgstr = 0
                next
              }
              in_msgid && /^"/ {
                line = $0
                sub(/^"/, "", line)
                sub(/"$/, "", line)
                msgid = msgid line
                next
              }
              in_msgid { in_msgid = 0 }
              /^msgstr "/ || /^msgstr\[[0-9]+\] "/ {
                # Starting a new msgstr (singular or indexed plural).
                # First, check whether the *previous* msgstr was empty.
                if (in_msgstr && msgstr == "") has_empty_msgstr = 1
                in_msgstr = 1; in_msgid = 0
                msgstr = $0
                sub(/^msgstr(\[[0-9]+\])? "/, "", msgstr)
                sub(/"$/, "", msgstr)
                next
              }
              in_msgstr && /^"/ {
                line = $0
                sub(/^"/, "", line)
                sub(/"$/, "", line)
                msgstr = msgstr line
                next
              }
              in_msgstr {
                if (msgstr == "") has_empty_msgstr = 1
                if (msgid != "" && has_empty_msgstr) print "- [ ] `" msgid "`"
                msgid = ""; msgstr = ""; in_msgstr = 0; has_empty_msgstr = 0
              }
              END {
                if (in_msgstr && msgstr == "") has_empty_msgstr = 1
                if (msgid != "" && has_empty_msgstr) print "- [ ] `" msgid "`"
              }
            ' "$po")

            count=$(echo "$untranslated" | grep -c '^\- \[' || true)

            # Find existing issue (check current title, then fall back to old format without [Translations] prefix)
            old_title="i18n: Untranslated strings in ${name} (${lang})"
            existing=$(gh issue list --label i18n --state open --search "in:title $title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -1)
            if [ -z "$existing" ]; then
              existing=$(gh issue list --label i18n --state open --search "in:title $old_title" --json number,title --jq ".[] | select(.title == \"$old_title\") | .number" | head -1)
            fi

            if [ "$count" -gt 0 ]; then
              # Build a raw GitHub URL for the PO file so GlossBoss can load it directly
              raw_url="https://raw.githubusercontent.com/${{ github.repository }}/main/${po}"
              edit_url="https://glossboss.pages.dev/?url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${raw_url}', safe=''))")"

              body=$(cat <<EOF
          @coderabbitai ignore

          ## Untranslated strings in \`app.${lang}.po\`

          **${count}** string(s) need translation:

          ${untranslated}

          **[Open in GlossBoss](${edit_url})** to edit this file directly.

          ---
          _Auto-managed by CI. Updated on $(date -u +%Y-%m-%d)._
          EOF
              )

              # Build assignee flags (create uses --assignee, edit uses --add-assignee)
              create_assignee_flags=""
              edit_assignee_flags=""
              if [ -n "$assignees" ]; then
                for user in $(echo "$assignees" | tr ',' ' '); do
                  create_assignee_flags="$create_assignee_flags --assignee $user"
                  edit_assignee_flags="$edit_assignee_flags --add-assignee $user"
                done
              fi

              if [ -n "$existing" ]; then
                # Remove assignees that are no longer in the config (tolerate bots that can't be unassigned)
                current_assignees=$(gh issue view "$existing" --json assignees --jq '.assignees[].login' 2>/dev/null || true)
                for current in $current_assignees; do
                  if ! echo ",$assignees," | grep -q ",$current,"; then
                    # Try to remove the assignee; only tolerate specific "not found"/bot-style failures
                    if ! remove_output=$(gh issue edit "$existing" --remove-assignee "$current" 2>&1); then
                      if echo "$remove_output" | grep -qiE 'not found|could not find the requested user'; then
                        echo "Skipping removal of $current (may be a bot or unknown user)"
                      else
                        echo "$remove_output" >&2
                        echo "Failed to remove assignee $current from issue #$existing" >&2
                        exit 1
                      fi
                    fi
                  fi
                done
                gh issue edit "$existing" --title "$title" --body "$body" $edit_assignee_flags
                echo "Updated issue #${existing} for ${lang}"
              else
                gh issue create --title "$title" --label i18n --body "$body" $create_assignee_flags
                echo "Created issue for ${lang}"
              fi
            else
              if [ -n "$existing" ]; then
                gh issue close "$existing" --comment "All strings in \`app.${lang}.po\` are now translated."
                echo "Closed issue #${existing} for ${lang}"
              else
                echo "No untranslated strings for ${lang}, no issue to manage"
              fi
            fi
          done
