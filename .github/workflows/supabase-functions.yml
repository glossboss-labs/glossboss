name: Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions.yml'
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Also deploy the current functions to production after staging succeeds'
        required: false
        default: false
        type: boolean

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate staging deployment secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_STAGING_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN and/or SUPABASE_STAGING_PROJECT_REF repository secrets."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.77.0

      - name: Deploy Edge Functions to staging
        run: |
          supabase functions deploy deepl-translate --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy azure-translate --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy gemini-translate --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy tts-elevenlabs --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-glossary --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-source --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy feedback-issue --project-ref "$SUPABASE_STAGING_PROJECT_REF" --use-api --no-verify-jwt

  deploy-production:
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PRODUCTION_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate production deployment secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PRODUCTION_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN and/or SUPABASE_PRODUCTION_PROJECT_REF repository secrets."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.77.0

      - name: Deploy Edge Functions to production
        run: |
          supabase functions deploy deepl-translate --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy azure-translate --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy gemini-translate --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy tts-elevenlabs --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-glossary --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-source --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy feedback-issue --project-ref "$SUPABASE_PRODUCTION_PROJECT_REF" --use-api --no-verify-jwt
