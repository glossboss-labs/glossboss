name: Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions.yml'
  workflow_dispatch:

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Supabase deployment secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN and/or SUPABASE_PROJECT_REF repository secrets."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.77.0

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy deepl-translate --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy azure-translate --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy gemini-translate --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy tts-elevenlabs --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-glossary --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy wp-source --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
          supabase functions deploy feedback-issue --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
