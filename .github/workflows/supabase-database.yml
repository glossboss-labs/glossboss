name: Checks / Supabase Database

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - '.github/workflows/supabase-database.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - '.github/workflows/supabase-database.yml'
  workflow_dispatch:

concurrency:
  group: supabase-database-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-local:
    name: Validate Local Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.77.0

      - name: Start local Supabase
        run: supabase start

      - name: Reset local database from migrations
        run: supabase db reset --local --no-seed

      - name: Lint local database
        run: supabase db lint --local --fail-on error

  deploy:
    name: Deploy Migrations
    needs: validate-local
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deployment secrets
        id: secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Deploy Skipped"
              echo ""
              echo "Configure \`SUPABASE_ACCESS_TOKEN\`, \`SUPABASE_PROJECT_REF\`, and \`SUPABASE_DB_PASSWORD\` to enable automatic migration pushes."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.77.0

      - name: Link project
        if: steps.secrets.outputs.ready == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        if: steps.secrets.outputs.ready == 'true'
        run: supabase db push --linked --include-all -p "$SUPABASE_DB_PASSWORD"
