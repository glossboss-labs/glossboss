name: Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Vite env for deploy
        if: github.event_name != 'pull_request'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ -z "$VITE_TURNSTILE_SITE_KEY" ]; then
            echo "::error::Missing VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, and/or VITE_TURNSTILE_SITE_KEY repository secrets."
            exit 1
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEPLOY_BRANCH="${{ github.head_ref }}"
          else
            DEPLOY_BRANCH="${{ github.ref_name }}"
          fi

          DEPLOY_OUTPUT="$(bunx wrangler pages deploy dist --project-name glossboss --branch "$DEPLOY_BRANCH" 2>&1 | tee /dev/stderr)"
          DEPLOY_URL="$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -n1)"

          if ! [[ "$DEPLOY_URL" =~ ^https://[A-Za-z0-9.-]+\.pages\.dev$ ]]; then
            echo "::error::Failed to detect a valid Cloudflare Pages URL from wrangler output."
            exit 1
          fi

          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview link
        if: github.event_name == 'pull_request' && steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- cloudflare-pages-preview-link -->'
            const body = [
              marker,
              `🚀 Preview deployment is ready: [${process.env.PREVIEW_URL}](${process.env.PREVIEW_URL})`,
            ].join('\n')

            let existingComment

            for await (const { data: comments } of github.paginate.iterator(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })) {
              existingComment = comments.find((comment) => {
                return comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
              })

              if (existingComment) {
                break
              }
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            })
